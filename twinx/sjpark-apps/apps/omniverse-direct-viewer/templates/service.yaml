apiVersion: v1
kind: Service
metadata:
  name: {{ include "omniverse-direct-viewer.fullname" . }}
  labels:
    {{- include "omniverse-direct-viewer.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "omniverse-direct-viewer.selectorLabels" . | nindent 4 }}
