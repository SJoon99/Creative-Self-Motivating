[package]
title = "Smart Farm Twin"
version = "0.1.0"  # Semantic Versioning is used: https://semver.org/
description = "POC controls for a strawberry smart farm digital twin."
category = "Digital Twin"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["kit", "smart farm", "digital twin", "strawberry", "ui"]  # Search keywords for the Extension Manager
preview_image = "data/preview.png"  # Preview to show in the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI
repository = "https://github.com/SJoon99/Creative-Self-Motivating"  # URL of the extension source repository


[dependencies]
"omni.kit.uiapp" = {}


[settings]


[[python.module]]  # Main python module this extension provides, it will be publicly available as "import joon.smartfarm.twin"
name = "joon.smartfarm.twin"


[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]


[[test]]
dependencies = [
    "omni.kit.test",
    "omni.kit.ui_test"  # UI testing extension
]

args = [
]
