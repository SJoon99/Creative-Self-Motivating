replicaCount: 1

nameOverride: ""
fullnameOverride: ""

namespace: sjpark
serviceAccountName: sjpark-sa

image:
  repository: python
  tag: "3.11"
  pullPolicy: IfNotPresent

gitSync:
  image: alpine/git@sha256:4a0e72d49596a1f5d3701aeedafdadc5c0da4062be4657c7bdc4017387f591cc
  repo: https://github.com/jongminpark0101/RAG_strawberry.git
  ref: main

persistence:
  enabled: true
  storageClassName: rook-ceph-block
  accessModes:
    - ReadWriteOnce
  size: 20Gi

server:
  port: 8080
  workers: 1
  verifyLlmOnStartup: true

rag:
  collectionName: strawberry_manual
  embeddingModel: BAAI/bge-m3
  topK: 5

llm:
  model: gemma4
  baseUrl: http://gemma4-vllm.sjpark.svc.cluster.local:8000/v1
  apiKeySecret:
    enabled: true
    name: gemma4-vllm-api-token
    key: API_TOKEN

apiAuth:
  enabled: true
  secretName: gemma4-vllm-api-token
  secretKey: API_TOKEN

service:
  # Spark Omniverse nodes are outside Kubernetes but on the TwinX internal LAN,
  # so expose only an internal MetalLB VIP and keep Bearer-token auth enabled.
  type: LoadBalancer
  loadBalancerIP: 10.38.38.241
  port: 8080

resources:
  requests:
    cpu: "1"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 12Gi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}
