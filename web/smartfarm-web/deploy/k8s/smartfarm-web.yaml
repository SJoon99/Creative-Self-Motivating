apiVersion: v1
kind: ConfigMap
metadata:
  name: smartfarm-web-config
data:
  config.json: |
    {
      "facilityId": "smartfarm-v1",
      "facilityName": "Seolhyang Reference Greenhouse",
      "apiBaseUrl": "/api",
      "stream": {
        "source": "local",
        "server": "10.34.21.100",
        "streamUrl": "http://10.34.21.100:8011",
        "signalingPath": "",
        "width": 1920,
        "height": 1080
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartfarm-web
  labels:
    app: smartfarm-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartfarm-web
  template:
    metadata:
      labels:
        app: smartfarm-web
    spec:
      containers:
        - name: smartfarm-web
          image: harbor.example.local/smartfarm/smartfarm-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: runtime-config
          configMap:
            name: smartfarm-web-config
---
apiVersion: v1
kind: Service
metadata:
  name: smartfarm-web
  labels:
    app: smartfarm-web
spec:
  type: LoadBalancer
  selector:
    app: smartfarm-web
  ports:
    - name: http
      port: 80
      targetPort: http
