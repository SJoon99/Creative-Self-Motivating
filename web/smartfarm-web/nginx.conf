# Smart Farm Web Portal — static SPA + optional API proxy.
#
# IMPORTANT: this serves the React portal and (optionally) proxies the Service
# API only. The Omniverse WebRTC stream is NOT proxied here — the browser
# connects directly to the NUC endpoint from config.json. Do not add a WebRTC
# media proxy to the K8S ingress / this server.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint for K8S liveness/readiness probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Runtime config: never cache so a ConfigMap swap takes effect immediately.
    location = /config.json {
        add_header Cache-Control "no-store, must-revalidate";
        expires -1;
    }

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service API proxy.  This keeps browser API calls same-origin with the web
    # portal and avoids CORS. WebRTC media/signaling is intentionally not
    # proxied here; the browser still connects to the NUC stream endpoint from
    # config.json.
    location /api/ {
        proxy_pass http://smartfarm-service.smartfarm.svc.cluster.local:8080/smartfarm/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: route everything else to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
