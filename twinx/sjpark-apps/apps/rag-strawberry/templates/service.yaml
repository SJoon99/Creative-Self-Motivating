apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-strawberry.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "rag-strawberry.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  selector:
    {{- include "rag-strawberry.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
